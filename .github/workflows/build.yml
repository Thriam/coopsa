name: Coop Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      PLUGIN_SDK_DIR: ${{ github.workspace }}\plugin-sdk
      GTA_SA_DIR: ${{ github.workspace }}\gta_sa_dummy
      XMAKE_ROOTDIR: ${{ github.workspace }}\.xmake-install
      SANNY_DIR: ${{ github.workspace }}\sanny-builder
      STATUS_FILE: ${{ github.workspace }}\build-status.md

    steps:
      # ==================================================================
      # INIT STATUS FILE
      # ==================================================================
      - name: Initialize build status report
        shell: pwsh
        run: |
          @"
          # CoopAndreas Build Status Report
          **Commit:** `235b1545b5607e55e5d56182e285648f2ee9b8e9`
          **Date:** $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          **Runner:** ${{ runner.os }}

          | Component | Status | Details |
          |-----------|--------|---------|
          "@ | Out-File -FilePath $env:STATUS_FILE -Encoding utf8

      # ==================================================================
      # CHECKOUT
      # ==================================================================
      - name: Checkout CoopAndreas (commit 235b1545)
        id: checkout
        uses: actions/checkout@v4
        with:
          repository: Tornamic/CoopAndreas
          ref: 235b1545b5607e55e5d56182e285648f2ee9b8e9
          fetch-depth: 0

      - name: Record checkout status
        if: always()
        shell: pwsh
        run: |
          $status = if ("${{ steps.checkout.outcome }}" -eq "success") { "✅ SUCCESS" } else { "❌ FAILED" }
          $detail = if ("${{ steps.checkout.outcome }}" -eq "success") { "Commit checked out" } else { "${{ steps.checkout.conclusion }}" }
          "| Source Checkout | $status | $detail |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8

      - name: Verify repo structure
        shell: pwsh
        run: |
          Write-Host "=== Workspace Contents ==="
          Get-ChildItem -Force
          Write-Host ""
          if (Test-Path xmake.lua) { Write-Host "✅ xmake.lua found" }
          else { Write-Host "❌ xmake.lua NOT found"; exit 1 }
          Write-Host ""
          Write-Host "=== SCM Files ==="
          Get-ChildItem scm -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "$($_.Name) - $($_.Length) bytes" }

      # ==================================================================
      # PLUGIN-SDK
      # ==================================================================
      - name: Restore plugin-sdk source
        id: cache-plugin-sdk
        uses: actions/cache@v4
        with:
          path: plugin-sdk
          key: plugin-sdk-src-050d18b6e1770477deab81a40028a40277583d97

      - name: Checkout plugin-sdk (pinned commit)
        if: steps.cache-plugin-sdk.outputs.cache-hit != 'true'
        id: checkout-plugin
        uses: actions/checkout@v4
        with:
          repository: DK22Pac/plugin-sdk
          ref: 050d18b6e1770477deab81a40028a40277583d97
          path: plugin-sdk

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore plugin.lib from cache
        id: cache-plugin
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\plugin-sdk\output\lib\plugin.lib
          key: plugin-sdk-lib-050d18b6e1770477deab81a40028a40277583d97

      - name: Generate plugin-sdk VS2022 solution
        if: steps.cache-plugin.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          "%PLUGIN_SDK_DIR%\tools\premake\premake5.exe" vs2022 --file="%PLUGIN_SDK_DIR%\tools\premake\premake5.lua"

      - name: Build plugin_sa static lib
        if: steps.cache-plugin.outputs.cache-hit != 'true'
        shell: cmd
        run: |
          msbuild "%PLUGIN_SDK_DIR%\plugin.sln" /t:plugin_sa /p:Configuration=Release /p:Platform=Win32 /m

      - name: Verify plugin.lib
        id: verify-plugin
        shell: pwsh
        run: |
          $lib = "$env:PLUGIN_SDK_DIR\output\lib\plugin.lib"
          if (-not (Test-Path $lib)) { 
            Write-Host "❌ plugin.lib MISSING at $lib"
            exit 1 
          }
          $size = (Get-Item $lib).Length
          Write-Host "✅ plugin.lib found: $lib ($size bytes)"

      - name: Record plugin-sdk status
        if: always()
        shell: pwsh
        run: |
          $lib = "$env:PLUGIN_SDK_DIR\output\lib\plugin.lib"
          if (Test-Path $lib) {
            $size = (Get-Item $lib).Length
            "| plugin-sdk | ✅ SUCCESS | plugin.lib available ($size bytes) |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          } else {
            "| plugin-sdk | ❌ FAILED | plugin.lib missing |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          }

      # ==================================================================
      # XMAKE
      # ==================================================================
      - name: Restore xmake installer
        id: cache-xmake-install
        uses: actions/cache@v4
        with:
          path: ${{ env.XMAKE_ROOTDIR }}
          key: xmake-install-3.0.9-win64

      - name: Set up xmake
        if: steps.cache-xmake-install.outputs.cache-hit != 'true'
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Add cached xmake to PATH
        if: steps.cache-xmake-install.outputs.cache-hit == 'true'
        shell: pwsh
        run: |
          $xmakeBin = "$env:XMAKE_ROOTDIR\x64"
          if (-not (Test-Path "$xmakeBin\xmake.exe")) {
            Write-Host "❌ Cached xmake.exe missing"
            exit 1
          }
          Add-Content $env:GITHUB_PATH "$xmakeBin"
          Write-Host "✅ xmake PATH set"

      - name: Verify xmake
        shell: cmd
        run: xmake --version

      - name: Restore xmake build cache
        uses: actions/cache@v4
        with:
          path: .xmake
          key: xmake-build-${{ runner.os }}-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-build-${{ runner.os }}-

      # ==================================================================
      # SANNY BUILDER 4.2.0
      # ==================================================================
      - name: Restore Sanny Builder 4.2.0
        id: cache-sanny
        uses: actions/cache@v4
        with:
          path: ${{ env.SANNY_DIR }}
          key: sanny-builder-4.2.0

      - name: Download Sanny Builder 4.2.0
        if: steps.cache-sanny.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://github.com/sannybuilder/dev/releases/download/v4.2.0/SannyBuilder-v4.2.0.zip"
          $zip = "${{ github.workspace }}\sanny.zip"
          Write-Host "Downloading Sanny Builder 4.2.0..."
          Invoke-WebRequest -Uri $url -OutFile $zip
          Write-Host "Extracting..."
          New-Item -ItemType Directory -Force -Path "${{ env.SANNY_DIR }}" | Out-Null
          Expand-Archive -Path $zip -DestinationPath "${{ env.SANNY_DIR }}" -Force
          Remove-Item $zip
          Write-Host "✅ Sanny Builder extracted"

      - name: Setup SB4 CoopAndreas mode
        shell: pwsh
        run: |
          $sannyData = "${{ env.SANNY_DIR }}\data"
          $coopMode = "${{ github.workspace }}\sdk\Sanny Builder 4\data\sa_sbl_coopandreas"
          if (Test-Path $coopMode) {
            New-Item -ItemType Directory -Force -Path "$sannyData\sa_sbl_coopandreas" | Out-Null
            Copy-Item -Path "$coopMode\*" -Destination "$sannyData\sa_sbl_coopandreas\" -Recurse -Force
            Write-Host "✅ CoopAndreas mode copied"
          } else {
            Write-Host "⚠️ CoopAndreas mode source not found"
          }

      # ==================================================================
      # COMPILE SCM (with fallback)
      # ==================================================================
      - name: Compile SCM scripts (Sanny Builder)
        id: compile-scm
        continue-on-error: true
        shell: pwsh
        run: |
          $sannyExe = "${{ env.SANNY_DIR }}\sanny.exe"
          $source = "${{ github.workspace }}\scm\main.txt"
          $outputDir = "${{ github.workspace }}\scm-output"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          if (Test-Path $sannyExe) {
            Write-Host "Attempting CLI compilation..."
            & $sannyExe --compile "$source" "$outputDir\main.scm" --game sa --no-splash
          } else {
            Write-Host "❌ sanny.exe not found"
            exit 1
          }

          if ((Test-Path "$outputDir\main.scm") -and (Test-Path "$outputDir\script.img")) {
            Write-Host "✅ SCM compilation succeeded"
          } else {
            Write-Host "❌ SCM compilation failed"
            exit 1
          }

      - name: Fallback — use pre-compiled SCM files
        if: steps.compile-scm.outcome == 'failure'
        shell: pwsh
        run: |
          $outputDir = "${{ github.workspace }}\scm-output"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          Write-Host "⚠️ Using pre-compiled SCM files from repo..."
          Copy-Item "${{ github.workspace }}\scm\main.scm" -Destination "$outputDir\main.scm" -Force -ErrorAction SilentlyContinue
          Copy-Item "${{ github.workspace }}\scm\script.img" -Destination "$outputDir\script.img" -Force -ErrorAction SilentlyContinue
          Write-Host "✅ Pre-compiled SCM files copied"

      - name: Record SCM status
        if: always()
        shell: pwsh
        run: |
          $outputDir = "${{ github.workspace }}\scm-output"
          $hasScm = Test-Path "$outputDir\main.scm"
          $hasImg = Test-Path "$outputDir\script.img"
          if ($hasScm -and $hasImg) {
            $scmSize = (Get-Item "$outputDir\main.scm").Length
            $imgSize = (Get-Item "$outputDir\script.img").Length
            $source = if ("${{ steps.compile-scm.outcome }}" -eq "success") { "Compiled by SB4" } else { "Pre-compiled from repo" }
            "| main.scm | ✅ SUCCESS | $source ($scmSize bytes) |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
            "| script.img | ✅ SUCCESS | Available ($imgSize bytes) |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          } else {
            "| SCM Files | ❌ FAILED | main.scm: $hasScm, script.img: $hasImg |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          }

      # ==================================================================
      # BUILD C++ PROJECTS
      # ==================================================================
      - name: Set up MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Configure xmake
        working-directory: ${{ github.workspace }}
        shell: cmd
        run: xmake f -y -p windows -a x86 -m release

      - name: Build client
        id: build-client
        working-directory: ${{ github.workspace }}
        shell: cmd
        run: xmake build client

      - name: Build server
        id: build-server
        working-directory: ${{ github.workspace }}
        shell: cmd
        run: xmake build server

      - name: Build proxy
        id: build-proxy
        working-directory: ${{ github.workspace }}
        shell: cmd
        run: xmake build proxy

      # ==================================================================
      # FIND AND VERIFY BUILD OUTPUTS (handles GTA_SA_DIR redirect)
      # ==================================================================
      - name: Find and collect build outputs
        id: find-outputs
        shell: pwsh
        run: |
          Write-Host "=== Searching for build outputs ==="

          # Search entire workspace for the built files
          $clientDll = Get-ChildItem -Recurse "${{ github.workspace }}" -Filter "CoopAndreasSA.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          $serverExe = Get-ChildItem -Recurse "${{ github.workspace }}" -Filter "server.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $proxyDll  = Get-ChildItem -Recurse "${{ github.workspace }}" -Filter "proxy.dll" -ErrorAction SilentlyContinue | Select-Object -First 1

          Write-Host ""
          if ($clientDll) { Write-Host "✅ Found CoopAndreasSA.dll at: $($clientDll.FullName) ($($clientDll.Length) bytes)" }
          else { Write-Host "❌ CoopAndreasSA.dll NOT FOUND anywhere" }

          if ($serverExe) { Write-Host "✅ Found server.exe at: $($serverExe.FullName) ($($serverExe.Length) bytes)" }
          else { Write-Host "❌ server.exe NOT FOUND anywhere" }

          if ($proxyDll) { Write-Host "✅ Found proxy.dll at: $($proxyDll.FullName) ($($proxyDll.Length) bytes)" }
          else { Write-Host "❌ proxy.dll NOT FOUND anywhere" }

          # Also show all DLL/EXE files in build dir and GTA_SA_DIR
          Write-Host ""
          Write-Host "=== All DLL/EXE in build/ ==="
          Get-ChildItem -Recurse "${{ github.workspace }}\build" -ErrorAction SilentlyContinue | Where-Object { $_.Extension -in ".dll",".exe" } | ForEach-Object { Write-Host $_.FullName }

          Write-Host ""
          Write-Host "=== All DLL/EXE in GTA_SA_DIR ==="
          Get-ChildItem -Recurse "$env:GTA_SA_DIR" -ErrorAction SilentlyContinue | Where-Object { $_.Extension -in ".dll",".exe" } | ForEach-Object { Write-Host $_.FullName }

          # Set outputs for next steps
          if ($clientDll) { Add-Content $env:GITHUB_OUTPUT "client_dll=$($clientDll.FullName)" }
          if ($serverExe) { Add-Content $env:GITHUB_OUTPUT "server_exe=$($serverExe.FullName)" }
          if ($proxyDll) { Add-Content $env:GITHUB_OUTPUT "proxy_dll=$($proxyDll.FullName)" }

      - name: Record build status
        if: always()
        shell: pwsh
        run: |
          $clientPath = "${{ steps.find-outputs.outputs.client_dll }}"
          $serverPath = "${{ steps.find-outputs.outputs.server_exe }}"
          $proxyPath = "${{ steps.find-outputs.outputs.proxy_dll }}"

          if ($clientPath -and (Test-Path $clientPath)) {
            $size = (Get-Item $clientPath).Length
            "| CoopAndreasSA.dll | ✅ SUCCESS | Built ($size bytes) at $($clientPath.Replace('${{ github.workspace }}', '.')) |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          } else {
            $reason = if ("${{ steps.build-client.outcome }}" -eq "failure") { "Build step failed" } else { "File not found after build (possibly redirected by GTA_SA_DIR)" }
            "| CoopAndreasSA.dll | ❌ FAILED | $reason |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          }

          if ($serverPath -and (Test-Path $serverPath)) {
            $size = (Get-Item $serverPath).Length
            "| server.exe | ✅ SUCCESS | Built ($size bytes) |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          } else {
            "| server.exe | ❌ FAILED | Build step: ${{ steps.build-server.outcome }} |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          }

          if ($proxyPath -and (Test-Path $proxyPath)) {
            $size = (Get-Item $proxyPath).Length
            "| proxy.dll | ✅ SUCCESS | Built ($size bytes) |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          } else {
            "| proxy.dll | ❌ FAILED | Build step: ${{ steps.build-proxy.outcome }} |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          }

      # ==================================================================
      # PREPARE PACKAGES
      # ==================================================================
      - name: Prepare client package
        id: pkg-client
        shell: pwsh
        run: |
          $clientDir = "${{ github.workspace }}\client-package"
          $coopDir = "$clientDir\CoopAndreas"
          New-Item -ItemType Directory -Force -Path $coopDir | Out-Null

          $clientDll = "${{ steps.find-outputs.outputs.client_dll }}"
          $proxyDll = "${{ steps.find-outputs.outputs.proxy_dll }}"

          if (-not $clientDll -or -not (Test-Path $clientDll)) {
            Write-Host "❌ CoopAndreasSA.dll not found. Cannot create client package."
            exit 1
          }
          if (-not $proxyDll -or -not (Test-Path $proxyDll)) {
            Write-Host "❌ proxy.dll not found. Cannot create client package."
            exit 1
          }

          Copy-Item $clientDll -Destination "$clientDir\CoopAndreasSA.dll" -Force
          Copy-Item $proxyDll -Destination "$clientDir\proxy.dll" -Force
          Copy-Item "${{ github.workspace }}\scm-output\main.scm" -Destination $coopDir\ -Force
          Copy-Item "${{ github.workspace }}\scm-output\script.img" -Destination $coopDir\ -Force

          if (Test-Path "${{ github.workspace }}\coopandreas.ini") {
            Copy-Item "${{ github.workspace }}\coopandreas.ini" -Destination $clientDir\
          }

          Write-Host "✅ Client package ready"
          Get-ChildItem -Recurse $clientDir | ForEach-Object { Write-Host "$($_.FullName.Replace($clientDir, '')) - $($_.Length) bytes" }

      - name: Prepare server package
        id: pkg-server
        shell: pwsh
        run: |
          $serverDir = "${{ github.workspace }}\server-package"
          New-Item -ItemType Directory -Force -Path $serverDir | Out-Null
          $serverExe = "${{ steps.find-outputs.outputs.server_exe }}"
          if (-not $serverExe -or -not (Test-Path $serverExe)) {
            Write-Host "❌ server.exe not found. Cannot create server package."
            exit 1
          }
          Copy-Item $serverExe -Destination "$serverDir\server.exe" -Force
          Write-Host "✅ Server package ready"

      - name: Record package status
        if: always()
        shell: pwsh
        run: |
          $clientDir = "${{ github.workspace }}\client-package"
          $serverDir = "${{ github.workspace }}\server-package"

          if (Test-Path "$clientDir\CoopAndreasSA.dll") {
            "| Client Package | ✅ SUCCESS | Ready for upload |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          } else {
            "| Client Package | ❌ FAILED | Missing client DLL |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          }

          if (Test-Path "$serverDir\server.exe") {
            "| Server Package | ✅ SUCCESS | Ready for upload |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          } else {
            "| Server Package | ❌ FAILED | Missing server EXE |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          }

      # ==================================================================
      # UPLOAD ARTIFACTS
      # ==================================================================
      - name: Upload CLIENT artifact
        id: upload-client
        if: success() || steps.pkg-client.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: CoopAndreas-Client
          path: client-package/**/*
          if-no-files-found: warn

      - name: Upload SERVER artifact
        id: upload-server
        if: success() || steps.pkg-server.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: CoopAndreas-Server
          path: server-package/**/*
          if-no-files-found: warn

      - name: Upload build status report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Status-Report
          path: build-status.md
          if-no-files-found: warn

      # ==================================================================
      # FINAL SUMMARY
      # ==================================================================
      - name: Finalize status report
        if: always()
        shell: pwsh
        run: |
          $summary = "${{ github.workspace }}\build-status.md"
          $clientOk = Test-Path "${{ github.workspace }}\client-package\CoopAndreasSA.dll"
          $serverOk = Test-Path "${{ github.workspace }}\server-package\server.exe"

          $overall = if ($clientOk -and $serverOk) { "✅ ALL COMPONENTS BUILT" } elseif ($clientOk -or $serverOk) { "⚠️ PARTIAL SUCCESS" } else { "❌ BUILD FAILED" }

          @"

          ## Summary
          - **Overall Status:** $overall
          - **Client Artifact:** $(if ($clientOk) { "✅ Available" } else { "❌ Missing" })
          - **Server Artifact:** $(if ($serverOk) { "✅ Available" } else { "❌ Missing" })

          ## Installation
          ### Client (copy to GTA:SA folder):
          ```
          GTA San Andreas/
          ├── CoopAndreasSA.dll
          ├── proxy.dll  (rename original eax.dll -> eax_orig.dll first, then rename proxy.dll -> eax.dll)
          └── CoopAndreas/
              ├── main.scm
              └── script.img
          ```
          ### Server (run anywhere):
          ```
          server.exe
          ```
          "@ | Out-File -FilePath $summary -Append -Encoding utf8

          Write-Host ""
          Write-Host "========== BUILD STATUS REPORT =========="
          Get-Content $summary | ForEach-Object { Write-Host $_ }
          Write-Host "========================================="

      - name: Set job summary
        if: always()
        shell: pwsh
        run: |
          $summary = Get-Content "${{ github.workspace }}\build-status.md" -Raw
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary

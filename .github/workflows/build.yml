name: Coop Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      PLUGIN_SDK_DIR: ${{ github.workspace }}\plugin-sdk
      GTA_SA_DIR: ${{ github.workspace }}\gta_sa_dummy
      XMAKE_ROOTDIR: ${{ github.workspace }}\.xmake-install
      SANNY_DIR: ${{ github.workspace }}\sanny-builder
      STATUS_FILE: ${{ github.workspace }}\build-status.md

    steps:
      # ==================================================================
      # INIT STATUS FILE
      # ==================================================================
      - name: Initialize build status report
        shell: pwsh
        run: |
          @"
          # CoopAndreas Build Status Report
          **Commit:** `235b1545b5607e55e5d56182e285648f2ee9b8e9`
          **Date:** $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          **Runner:** ${{ runner.os }}

          | Component | Status | Details |
          |-----------|--------|---------|
          "@ | Out-File -FilePath $env:STATUS_FILE -Encoding utf8

      # ==================================================================
      # CHECKOUT
      # ==================================================================
      - name: Checkout CoopAndreas (commit 235b1545)
        id: checkout
        uses: actions/checkout@v4
        with:
          repository: Tornamic/CoopAndreas
          ref: 235b1545b5607e55e5d56182e285648f2ee9b8e9
          fetch-depth: 0

      - name: Record checkout status
        if: always()
        shell: pwsh
        run: |
          $status = if ("${{ steps.checkout.outcome }}" -eq "success") { "✅ SUCCESS" } else { "❌ FAILED" }
          $detail = if ("${{ steps.checkout.outcome }}" -eq "success") { "Commit checked out" } else { "${{ steps.checkout.conclusion }}" }
          "| Source Checkout | $status | $detail |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8

      - name: Verify repo structure
        shell: pwsh
        run: |
          Write-Host "=== Workspace Contents ==="
          Get-ChildItem -Force
          Write-Host ""
          if (Test-Path xmake.lua) { Write-Host "✅ xmake.lua found" }
          else { Write-Host "❌ xmake.lua NOT found"; exit 1 }
          Write-Host ""
          Write-Host "=== SCM Files ==="
          Get-ChildItem scm -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "$($_.Name) - $($_.Length) bytes" }
          Write-Host ""
          Write-Host "=== SDK Files ==="
          Get-ChildItem "sdk\Sanny Builder 4" -Recurse -ErrorAction SilentlyContinue | Where-Object { -not $_.PSIsContainer } | Select-Object -First 10 | ForEach-Object { Write-Host "$($_.FullName.Replace($PWD.Path, '')) - $($_.Length) bytes" }

      # ==================================================================
      # PLUGIN-SDK
      # ==================================================================
      - name: Restore plugin-sdk source
        id: cache-plugin-sdk
        uses: actions/cache@v4
        with:
          path: plugin-sdk
          key: plugin-sdk-src-050d18b6e1770477deab81a40028a40277583d97

      - name: Checkout plugin-sdk (pinned commit)
        if: steps.cache-plugin-sdk.outputs.cache-hit != 'true'
        id: checkout-plugin
        uses: actions/checkout@v4
        with:
          repository: DK22Pac/plugin-sdk
          ref: 050d18b6e1770477deab81a40028a40277583d97
          path: plugin-sdk

      - name: Record plugin-sdk status
        if: always()
        shell: pwsh
        run: |
          $status = if ("${{ steps.checkout-plugin.outcome }}" -eq "success" -or "${{ steps.cache-plugin-sdk.outputs.cache-hit }}" -eq "true") { "✅ SUCCESS" } else { "❌ FAILED" }
          $detail = if ("${{ steps.cache-plugin-sdk.outputs.cache-hit }}" -eq "true") { "Restored from cache" } else { "Checked out from GitHub" }
          "| plugin-sdk | $status | $detail |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore plugin.lib from cache
        id: cache-plugin
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\plugin-sdk\output\lib\plugin.lib
          key: plugin-sdk-lib-050d18b6e1770477deab81a40028a40277583d97

      - name: Generate plugin-sdk VS2022 solution
        if: steps.cache-plugin.outputs.cache-hit != 'true'
        id: gen-plugin
        shell: cmd
        run: |
          "%PLUGIN_SDK_DIR%\tools\premake\premake5.exe" vs2022 --file="%PLUGIN_SDK_DIR%\tools\premake\premake5.lua"

      - name: Build plugin_sa static lib
        if: steps.cache-plugin.outputs.cache-hit != 'true'
        id: build-plugin
        shell: cmd
        run: |
          msbuild "%PLUGIN_SDK_DIR%\plugin.sln" /t:plugin_sa /p:Configuration=Release /p:Platform=Win32 /m

      - name: Verify plugin.lib
        id: verify-plugin
        shell: pwsh
        run: |
          $lib = "$env:PLUGIN_SDK_DIR\output\lib\plugin.lib"
          if (-not (Test-Path $lib)) { 
            Write-Host "❌ plugin.lib MISSING at $lib"
            exit 1 
          }
          $size = (Get-Item $lib).Length
          Write-Host "✅ plugin.lib found: $lib ($size bytes)"

      - name: Record plugin.lib status
        if: always()
        shell: pwsh
        run: |
          $lib = "$env:PLUGIN_SDK_DIR\output\lib\plugin.lib"
          if (Test-Path $lib) {
            $size = (Get-Item $lib).Length
            "| plugin.lib | ✅ SUCCESS | Built/Restored ($size bytes) |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          } else {
            "| plugin.lib | ❌ FAILED | File not found after build |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          }

      # ==================================================================
      # XMAKE
      # ==================================================================
      - name: Restore xmake installer
        id: cache-xmake-install
        uses: actions/cache@v4
        with:
          path: ${{ env.XMAKE_ROOTDIR }}
          key: xmake-install-3.0.9-win64

      - name: Set up xmake
        if: steps.cache-xmake-install.outputs.cache-hit != 'true'
        id: setup-xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Add cached xmake to PATH
        if: steps.cache-xmake-install.outputs.cache-hit == 'true'
        shell: pwsh
        run: |
          $xmakeBin = "$env:XMAKE_ROOTDIR\x64"
          if (-not (Test-Path "$xmakeBin\xmake.exe")) {
            Write-Host "❌ Cached xmake.exe missing"
            exit 1
          }
          Add-Content $env:GITHUB_PATH "$xmakeBin"
          Write-Host "✅ xmake PATH set"

      - name: Verify xmake
        id: verify-xmake
        shell: cmd
        run: xmake --version

      - name: Record xmake status
        if: always()
        shell: pwsh
        run: |
          $status = if ("${{ steps.verify-xmake.outcome }}" -eq "success") { "✅ SUCCESS" } else { "❌ FAILED" }
          $detail = if ("${{ steps.cache-xmake-install.outputs.cache-hit }}" -eq "true") { "Restored from cache" } else { "Fresh install" }
          "| xmake | $status | $detail |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8

      - name: Restore xmake build cache
        id: cache-xmake-build
        uses: actions/cache@v4
        with:
          path: .xmake
          key: xmake-build-${{ runner.os }}-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-build-${{ runner.os }}-

      # ==================================================================
      # SANNY BUILDER 4.2.0
      # ==================================================================
      - name: Restore Sanny Builder 4.2.0
        id: cache-sanny
        uses: actions/cache@v4
        with:
          path: ${{ env.SANNY_DIR }}
          key: sanny-builder-4.2.0

      - name: Download Sanny Builder 4.2.0
        if: steps.cache-sanny.outputs.cache-hit != 'true'
        id: download-sanny
        shell: pwsh
        run: |
          $url = "https://github.com/sannybuilder/dev/releases/download/v4.2.0/SannyBuilder-v4.2.0.zip"
          $zip = "${{ github.workspace }}\sanny.zip"
          Write-Host "Downloading Sanny Builder 4.2.0..."
          Invoke-WebRequest -Uri $url -OutFile $zip
          Write-Host "Extracting to ${{ env.SANNY_DIR }}..."
          New-Item -ItemType Directory -Force -Path "${{ env.SANNY_DIR }}" | Out-Null
          Expand-Archive -Path $zip -DestinationPath "${{ env.SANNY_DIR }}" -Force
          Remove-Item $zip
          Write-Host "✅ Sanny Builder extracted"
          Get-ChildItem "${{ env.SANNY_DIR }}"

      - name: Record Sanny Builder status
        if: always()
        shell: pwsh
        run: |
          $sannyExe = "${{ env.SANNY_DIR }}\sanny.exe"
          if (Test-Path $sannyExe) {
            "| Sanny Builder 4.2.0 | ✅ SUCCESS | Downloaded/Restored |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          } else {
            "| Sanny Builder 4.2.0 | ❌ FAILED | sanny.exe not found |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          }

      - name: Setup SB4 CoopAndreas mode
        id: setup-sb-mode
        shell: pwsh
        run: |
          $sannyData = "${{ env.SANNY_DIR }}\data"
          $coopMode = "${{ github.workspace }}\sdk\Sanny Builder 4\data\sa_sbl_coopandreas"

          if (-not (Test-Path $coopMode)) {
            Write-Host "⚠️ CoopAndreas mode source not found at $coopMode"
            "| SB4 CoopAndreas Mode | ⚠️ WARNING | Mode files not found in repo |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
            return
          }

          New-Item -ItemType Directory -Force -Path "$sannyData\sa_sbl_coopandreas" | Out-Null
          Copy-Item -Path "$coopMode\*" -Destination "$sannyData\sa_sbl_coopandreas\" -Recurse -Force
          Write-Host "✅ CoopAndreas mode copied to SB4"
          "| SB4 CoopAndreas Mode | ✅ SUCCESS | Mode files installed |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8

      # ==================================================================
      # COMPILE SCM
      # ==================================================================
      - name: Compile SCM scripts (Sanny Builder)
        id: compile-scm
        continue-on-error: true
        shell: pwsh
        run: |
          $sannyExe = "${{ env.SANNY_DIR }}\sanny.exe"
          $source = "${{ github.workspace }}\scm\main.txt"
          $outputDir = "${{ github.workspace }}\scm-output"

          if (-not (Test-Path $sannyExe)) {
            Write-Host "❌ sanny.exe not found"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          Write-Host "Attempting CLI compilation..."
          & $sannyExe --compile "$source" "$outputDir\main.scm" --game sa --no-splash

          $hasScm = Test-Path "$outputDir\main.scm"
          $hasImg = Test-Path "$outputDir\script.img"

          if ($hasScm -and $hasImg) {
            $scmSize = (Get-Item "$outputDir\main.scm").Length
            $imgSize = (Get-Item "$outputDir\script.img").Length
            Write-Host "✅ SCM compiled: main.scm ($scmSize bytes), script.img ($imgSize bytes)"
          } else {
            Write-Host "❌ SCM compilation incomplete. Scm: $hasScm, Img: $hasImg"
            exit 1
          }

      - name: Fallback — use pre-compiled SCM files
        id: fallback-scm
        if: steps.compile-scm.outcome == 'failure'
        shell: pwsh
        run: |
          $outputDir = "${{ github.workspace }}\scm-output"
          $repoScm = "${{ github.workspace }}\scm\main.scm"
          $repoImg = "${{ github.workspace }}\scm\script.img"

          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          $scmExists = Test-Path $repoScm
          $imgExists = Test-Path $repoImg

          if ($scmExists) {
            Copy-Item $repoScm -Destination "$outputDir\main.scm" -Force
            $size = (Get-Item $repoScm).Length
            Write-Host "✅ main.scm copied from repo ($size bytes)"
          } else {
            Write-Host "❌ main.scm not found in repo"
          }

          if ($imgExists) {
            Copy-Item $repoImg -Destination "$outputDir\script.img" -Force
            $size = (Get-Item $repoImg).Length
            Write-Host "✅ script.img copied from repo ($size bytes)"
          } else {
            Write-Host "❌ script.img not found in repo"
          }

          if (-not $scmExists -or -not $imgExists) {
            exit 1
          }

      - name: Record SCM status
        if: always()
        shell: pwsh
        run: |
          $outputDir = "${{ github.workspace }}\scm-output"
          $hasScm = Test-Path "$outputDir\main.scm"
          $hasImg = Test-Path "$outputDir\script.img"

          if ($hasScm -and $hasImg) {
            $scmSize = (Get-Item "$outputDir\main.scm").Length
            $imgSize = (Get-Item "$outputDir\script.img").Length
            if ("${{ steps.compile-scm.outcome }}" -eq "success") {
              "| main.scm | ✅ SUCCESS | Compiled by SB4 ($scmSize bytes) |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
            } else {
              "| main.scm | ✅ SUCCESS | Pre-compiled from repo ($scmSize bytes) |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
            }
            "| script.img | ✅ SUCCESS | Available ($imgSize bytes) |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          } else {
            $reason = @()
            if (-not $hasScm) { $reason += "main.scm missing" }
            if (-not $hasImg) { $reason += "script.img missing" }
            "| SCM Files | ❌ FAILED | $($reason -join ', ') |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          }

      # ==================================================================
      # BUILD C++ PROJECTS
      # ==================================================================
      - name: Set up MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x86

      - name: Configure xmake
        id: xmake-config
        working-directory: ${{ github.workspace }}
        shell: cmd
        run: xmake f -y -p windows -a x86 -m release

      - name: Record xmake config status
        if: always()
        shell: pwsh
        run: |
          $status = if ("${{ steps.xmake-config.outcome }}" -eq "success") { "✅ SUCCESS" } else { "❌ FAILED" }
          "| xmake configure | $status | Platform: windows, Arch: x86, Mode: release |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8

      - name: Build client
        id: build-client
        working-directory: ${{ github.workspace }}
        shell: cmd
        run: xmake build client

      - name: Build server
        id: build-server
        working-directory: ${{ github.workspace }}
        shell: cmd
        run: xmake build server

      - name: Build proxy
        id: build-proxy
        working-directory: ${{ github.workspace }}
        shell: cmd
        run: xmake build proxy

      - name: Verify build outputs
        id: verify-builds
        shell: pwsh
        run: |
          $buildDir = "${{ github.workspace }}\build\windows\x86\release"

          $clientDll = "$buildDir\CoopAndreasSA.dll"
          $serverExe = "$buildDir\server.exe"
          $proxyDll  = "$buildDir\proxy.dll"

          $clientOk = Test-Path $clientDll
          $serverOk = Test-Path $serverExe
          $proxyOk  = Test-Path $proxyDll

          Write-Host "=== Build Verification ==="
          if ($clientOk) { $s = (Get-Item $clientDll).Length; Write-Host "✅ CoopAndreasSA.dll ($s bytes)" } else { Write-Host "❌ CoopAndreasSA.dll MISSING" }
          if ($serverOk) { $s = (Get-Item $serverExe).Length; Write-Host "✅ server.exe ($s bytes)" } else { Write-Host "❌ server.exe MISSING" }
          if ($proxyOk)  { $s = (Get-Item $proxyDll).Length; Write-Host "✅ proxy.dll ($s bytes)" } else { Write-Host "❌ proxy.dll MISSING" }

          if (-not ($clientOk -and $serverOk -and $proxyOk)) {
            Write-Host ""
            Write-Host "=== All build outputs ==="
            Get-ChildItem -Recurse "${{ github.workspace }}\build" -ErrorAction SilentlyContinue | Where-Object { $_.Extension -in ".dll",".exe",".lib" } | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

      - name: Record build status
        if: always()
        shell: pwsh
        run: |
          $buildDir = "${{ github.workspace }}\build\windows\x86\release"

          $components = @(
            @{Name="CoopAndreasSA.dll"; Step="build-client"; File="$buildDir\CoopAndreasSA.dll"},
            @{Name="server.exe"; Step="build-server"; File="$buildDir\server.exe"},
            @{Name="proxy.dll"; Step="build-proxy"; File="$buildDir\proxy.dll"}
          )

          foreach ($c in $components) {
            $stepOutcome = (Get-Variable -Name ("steps." + $c.Step + ".outcome") -ErrorAction SilentlyContinue).Value
            if (Test-Path $c.File) {
              $size = (Get-Item $c.File).Length
              "| $($c.Name) | ✅ SUCCESS | Built ($size bytes) |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
            } else {
              $reason = if ($stepOutcome -eq "failure") { "Build step failed" } else { "File not found after build" }
              "| $($c.Name) | ❌ FAILED | $reason |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
            }
          }

      # ==================================================================
      # PREPARE PACKAGES
      # ==================================================================
      - name: Prepare client package
        id: pkg-client
        shell: pwsh
        run: |
          $clientDir = "${{ github.workspace }}\client-package"
          $coopDir = "$clientDir\CoopAndreas"

          New-Item -ItemType Directory -Force -Path $coopDir | Out-Null

          # Copy binaries
          Copy-Item "${{ github.workspace }}\build\windows\x86\release\CoopAndreasSA.dll" -Destination $clientDir\ -ErrorAction Stop
          Copy-Item "${{ github.workspace }}\build\windows\x86\release\proxy.dll" -Destination $clientDir\ -ErrorAction Stop

          # Copy SCM files
          Copy-Item "${{ github.workspace }}\scm-output\main.scm" -Destination $coopDir\ -ErrorAction Stop
          Copy-Item "${{ github.workspace }}\scm-output\script.img" -Destination $coopDir\ -ErrorAction Stop

          # Config file (optional - may be created at runtime)
          if (Test-Path "${{ github.workspace }}\coopandreas.ini") {
            Copy-Item "${{ github.workspace }}\coopandreas.ini" -Destination $clientDir\
          }

          Write-Host "✅ Client package ready"
          Get-ChildItem -Recurse $clientDir | ForEach-Object { Write-Host "$($_.FullName.Replace($clientDir, '')) - $($_.Length) bytes" }

      - name: Prepare server package
        id: pkg-server
        shell: pwsh
        run: |
          $serverDir = "${{ github.workspace }}\server-package"
          New-Item -ItemType Directory -Force -Path $serverDir | Out-Null
          Copy-Item "${{ github.workspace }}\build\windows\x86\release\server.exe" -Destination $serverDir\ -ErrorAction Stop
          Write-Host "✅ Server package ready"
          Get-ChildItem $serverDir

      - name: Record package status
        if: always()
        shell: pwsh
        run: |
          $clientDir = "${{ github.workspace }}\client-package"
          $serverDir = "${{ github.workspace }}\server-package"

          if (Test-Path "$clientDir\CoopAndreasSA.dll") {
            "| Client Package | ✅ SUCCESS | Ready for artifact upload |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          } else {
            "| Client Package | ❌ FAILED | Missing binaries |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          }

          if (Test-Path "$serverDir\server.exe") {
            "| Server Package | ✅ SUCCESS | Ready for artifact upload |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          } else {
            "| Server Package | ❌ FAILED | Missing binary |" | Out-File -FilePath $env:STATUS_FILE -Append -Encoding utf8
          }

      # ==================================================================
      # UPLOAD ARTIFACTS
      # ==================================================================
      - name: Upload CLIENT artifact
        id: upload-client
        uses: actions/upload-artifact@v4
        with:
          name: CoopAndreas-Client
          path: client-package/**/*
          if-no-files-found: error

      - name: Upload SERVER artifact
        id: upload-server
        uses: actions/upload-artifact@v4
        with:
          name: CoopAndreas-Server
          path: server-package/**/*
          if-no-files-found: error

      - name: Upload build status report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Status-Report
          path: build-status.md
          if-no-files-found: warn

      # ==================================================================
      # FINAL STATUS SUMMARY
      # ==================================================================
      - name: Finalize status report
        if: always()
        shell: pwsh
        run: |
          $summary = "${{ github.workspace }}\build-status.md"

          @"

          ## Summary
          - **Overall Status:** $(if ($env:GITHUB_RUNOutcome -eq "success") { "✅ PASSED" } else { "⚠️ COMPLETED WITH ISSUES" })
          - **Client Artifact:** $(if (Test-Path "${{ github.workspace }}\client-package\CoopAndreasSA.dll") { "✅ Available" } else { "❌ Missing" })
          - **Server Artifact:** $(if (Test-Path "${{ github.workspace }}\server-package\server.exe") { "✅ Available" } else { "❌ Missing" })

          ## Installation
          ### Client (copy to GTA:SA folder):
          ```
          GTA San Andreas/
          ├── CoopAndreasSA.dll
          ├── proxy.dll  (rename to eax.dll, backup original first!)
          └── CoopAndreas/
              ├── main.scm
              └── script.img
          ```

          ### Server (run anywhere):
          ```
          server.exe
          ```
          "@ | Out-File -FilePath $summary -Append -Encoding utf8

          Write-Host ""
          Write-Host "========== BUILD STATUS REPORT =========="
          Get-Content $summary | ForEach-Object { Write-Host $_ }
          Write-Host "========================================="

      - name: Set job summary
        if: always()
        shell: pwsh
        run: |
          $summary = Get-Content "${{ github.workspace }}\build-status.md" -Raw
          Write-Output "::notice::Build status report generated"
          # GitHub Step Summary
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
